<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RudiCare AI Assistant - Streaming POC</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        #app-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 800px; }
        
        /* Layout for Video and Avatar */
        .video-grid { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .video-box { width: 48%; background: #000; border-radius: 12px; overflow: hidden; position: relative; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        #emotion-display { font-size: 24px; font-weight: bold; color: #007bff; margin: 15px 0; }
        button { padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; background: #007bff; color: white; width: 200px; }
        canvas { display: none; } /* Hidden canvas for snapshots */
    </style>
</head>
<body>
    <div id="app-container">
        <h1>RudiCare Mood-Aware AI</h1>
        
        <div id="emotion-display">Detecting Mood: <span id="current-emotion">Waiting...</span></div>

        <div class="video-grid">
            <div class="video-box">
                <span class="label">You (Webcam)</span>
                <video id="userWebcam" autoplay playsinline muted></video>
            </div>
            <div class="video-box">
                <span class="label">RudiCare Avatar</span>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <button id="start-btn">Start Session</button>
        <canvas id="snapshotCanvas"></canvas>
    </div>

    <script>
        const video = document.getElementById('userWebcam');
        const canvas = document.getElementById('snapshotCanvas');
        const emotionText = document.getElementById('current-emotion');
        const startBtn = document.getElementById('start-btn');
        
        // YOUR LAMBDA URL (Replace this with your actual Function URL or API Gateway URL)
        const LAMBDA_ENDPOINT = "https://gdkau5zbrvyzeagmqrhgtytd4a0qnkwo.lambda-url.us-east-2.on.aws/";

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                // Start analyzing every 5 seconds
                setInterval(captureAndAnalyze, 5000);
            } catch (err) {
                console.error("Camera error: ", err);
            }
        }

        async function captureAndAnalyze() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw current video frame to hidden canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to Base64 for Rekognition
            const imageData = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const response = await fetch(LAMBDA_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: json.stringify({ image: imageData })
                });
                const data = await response.json();
                emotionText.innerText = data.emotion || "Neutral";
            } catch (err) {
                console.error("Analysis failed:", err);
            }
        }

        startBtn.addEventListener('click', startCamera);
    </script>
</body>
</html>
